<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#faf8f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15110d" media="(prefers-color-scheme: dark)" />

    <!-- Primary -->
    <title>Megha Seth -- Madhubani, Pichwai, Lippan and Gond folk art</title>
    <meta
      name="description"
      content="Original folk paintings by Megha Seth in Madhubani, Pichwai, Lippan, Gond and texture art. Commissions and workshops from India."
    />

    <!-- Robots / canonical / Open Graph / Twitter / JSON-LD are injected at
         build time by the SEO plugin in vite.config.ts. The placeholders below
         exist so anyone opening the file in a browser without running a build
         still sees something reasonable. -->
    <link rel="canonical" href="https://sagargupta.online/folk-art-portfolio/" />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Megha Seth -- Madhubani, Pichwai, Lippan and Gond folk art" />
    <meta property="og:description" content="Original folk paintings by Megha Seth in Madhubani, Pichwai, Lippan, Gond and texture art. Commissions and workshops from India." />
    <meta property="og:url" content="https://sagargupta.online/folk-art-portfolio/" />
    <meta property="og:image" content="https://sagargupta.online/folk-art-portfolio/logo.jpg" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="Kalcher by Megha" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Megha Seth -- Madhubani, Pichwai, Lippan and Gond folk art" />
    <meta name="twitter:description" content="Original folk paintings by Megha Seth in Madhubani, Pichwai, Lippan, Gond and texture art. Commissions and workshops from India." />
    <meta name="twitter:image" content="https://sagargupta.online/folk-art-portfolio/logo.jpg" />

    <link rel="icon" href="/folk-art-portfolio/logo.jpg" type="image/jpeg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/folk-art-portfolio/logo-180.png" />

    <!--seo-injection-marker-->

    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body id="top" class="font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
