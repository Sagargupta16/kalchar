name: Deploy to GitHub Pages

# DORMANT FALLBACK (Phase 2). The site moved to Vercel (kalchar.co.in serves
# the dynamic Next app: DB + admin + auth, which Pages can't host). This Pages
# workflow no longer runs on push -- `main` is now the dynamic app and would
# fail a static export. Kept as a manual-only escape hatch: if Vercel ever
# needs to be rolled back, re-add `output: "export"` and run this by hand to
# republish the last static build to Pages.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Add CNAME to export
        # Next.js static export writes to `out/`. Copy the apex domain config so
        # GitHub Pages serves the build at kalchar.co.in instead of the default
        # *.github.io URL.
        run: cp public/CNAME out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
