name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

# Least-privilege default: CI only reads the repo to lint/typecheck/build.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan repository history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: verify and browser test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Migration artifact guard
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | grep -qx 'lib/db/schema.ts'; then
            if ! git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | grep -Eq '^drizzle/[0-9].*\.sql$'; then
              echo '::error::lib/db/schema.ts changed without a committed SQL migration.'
              exit 1
            fi
          fi

      - name: Elevation-token guard
        # The design system routes ALL depth through the tokenized elevation
        # scale (shadow-e0..e5 + shadow-hairline, globals.css). Raw Tailwind
        # shadows and ad-hoc black/white rings were migrated out in v1.33.0;
        # this fails the build if drift creeps back in.
        run: |
          if grep -rEn 'shadow-(sm|md|lg|xl|2xl)\b|ring-(black|white)/' components/ app/ --include='*.tsx'; then
            echo '::error::Raw shadow/ring utility found. Use the elevation tokens (shadow-e0..e5, shadow-hairline) instead. See docs/UI-CONSISTENCY-PLAN.md.'
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        # Pure-function unit suite (no Neon/R2), so it runs before the
        # secret-injected build and fails fast on a logic regression.
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # The catalog seam reads Neon + R2 at build time, so the build needs
          # these. Stored as encrypted repo secrets (see docs/DEPLOYMENT.md).
          # NEXT_PUBLIC_IMAGE_BASE_URL is baked into the client bundle's
          # <picture> srcsets.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_IMAGE_BASE_URL: ${{ secrets.NEXT_PUBLIC_IMAGE_BASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser and accessibility tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_PORT: 3001
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_IMAGE_BASE_URL: ${{ secrets.NEXT_PUBLIC_IMAGE_BASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
